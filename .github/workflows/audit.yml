name: Audit

# Weekly `npm audit` alarm. The README/CLAUDE.md headline is "0 vulnerabilities";
# nothing on PRs runs audit, so a newly-disclosed advisory would rot silently. This
# is a SCHEDULED visibility lane, never a PR gate — a transitive advisory shouldn't
# red-block an unrelated PR (see the plan's rejected "hard per-PR gate" alt).
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      # No `npm ci` — `npm audit` resolves from the committed lockfile alone. The
      # single root lockfile carries every workspace's resolutions, so one audit
      # covers backend + frontend + root tooling in one pass.
      - name: Audit (all workspaces)
        run: npm audit --audit-level=high
