name: PR
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # pull-requests: read is required on `pull_request` events by the API calls that
  # dorny/paths-filter (listFiles, in the `changes` job) and gitleaks-action
  # (GET /pulls/:n/commits, in `secret-scan`) make — without it both 403 with
  # "Resource not accessible by integration". Read-only; no write scope needed.
  pull-requests: read

jobs:
  # ────────────────────────────────────────────────────────────────
  # Path filter — decides which downstream lanes run. Cheap lanes gate
  # every PR; expensive lanes (e2e) fire only when their code changes.
  # Edit .github/workflows/** → the lint + backend lanes re-validate.
  # Use the Run workflow button (workflow_dispatch) to force a full run.
  # ────────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lint:
              - 'backend/src/**/*.ts'
              - 'frontend/src/**/*.{ts,tsx}'
              - 'shared/**/*.ts'
              - 'tests/**/*.ts'
              - 'eslint.config.mjs'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
            backend:
              - 'backend/**'
              - 'shared/**'
              - 'tests/**'
              - 'tools/**'
              - 'package.json'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'shared/**'
              - 'package.json'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'shared/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              # A dep-only bump is the case most likely to break E2E — without these
              # the package files skip the only lane that would catch it.
              - 'package*.json'
              - 'backend/package*.json'
              - 'frontend/package*.json'

  # ── Lint — eslint flat config across backend/src, shared, tests, frontend/src.
  lint:
    needs: [changes]
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  # ── Typecheck — the tests-inclusive type gate. Vitest (esbuild) strips types
  #    without checking, so a type error in any test/arch file passes every other
  #    lane; this closes that hole. Needs all three trees installed: backend/src and
  #    the frontend resolve their imports from their own node_modules.
  typecheck:
    needs: [changes]
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run typecheck

  # ── Backend — typecheck/build + the node test tiers (unit + integration + arch).
  backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --prefix backend
      - run: npm run build --prefix backend
      # Boot the real built artifact under Node's NodeNext ESM resolver — the one
      # surface tsc/vitest never exercise. Zero-dep (node tools/smoke.mjs), so no
      # root `npm ci`; the dist the prior step built lives at backend/dist/…
      - run: npm run test:smoke:dist
      - run: npm test --prefix backend

  # ── Frontend — typecheck + vite build + the jsdom test tier.
  frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - run: npm test --prefix frontend

  # ── E2E — the expensive lane. Real browser + both servers. Only on code change.
  e2e:
    needs: [changes]
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test            # always-on API specs
      - run: npm run test:ui                 # flag-gated UI specs (built frontend)

  # ────────────────────────────────────────────────────────────────
  # Lockfile drift — `npm install --package-lock-only` must be a no-op
  # on a fresh checkout. Catches a dep that silently rewrites the
  # lockfile on every contributor's first install.
  # ────────────────────────────────────────────────────────────────
  lockfile-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm install --package-lock-only --ignore-scripts
      - run: npm install --package-lock-only --ignore-scripts --prefix backend
      - run: npm install --package-lock-only --ignore-scripts --prefix frontend
      - name: Assert lockfiles unchanged
        run: git diff --exit-code package-lock.json backend/package-lock.json frontend/package-lock.json

  # ────────────────────────────────────────────────────────────────
  # Secret scan — cheap leak insurance for a widely-cloned template;
  # reinforces the repo's "don't leak" ethos. fetch-depth: 0 so gitleaks
  # sees full history. Only the auto-provided GITHUB_TOKEN is needed.
  # NOTE: gitleaks-action needs a GITLEAKS_LICENSE only for ORG-owned
  # repos — this repo is personal-account-owned, so none is required. If
  # it is ever transferred to an org, the license becomes mandatory.
  # Pinned @v3 (the current major): @v2 runs on the deprecated Node 20
  # action runtime and hard-fails on current GitHub-hosted runners.
  # ────────────────────────────────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
