name: PR
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # pull-requests: read is required on `pull_request` events by the API calls that
  # dorny/paths-filter (listFiles, in the `changes` job) and gitleaks-action
  # (GET /pulls/:n/commits, in `secret-scan`) make — without it both 403 with
  # "Resource not accessible by integration". Read-only; no write scope needed.
  pull-requests: read

jobs:
  # ────────────────────────────────────────────────────────────────
  # Path filter — decides which downstream lanes run. Cheap lanes gate
  # every PR; expensive lanes (e2e) fire only when their code changes.
  # Edit .github/workflows/** → the lint + backend lanes re-validate.
  # Use the Run workflow button (workflow_dispatch) to force a full run.
  # ────────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lint:
              - 'backend/src/**/*.ts'
              - 'frontend/src/**/*.{ts,tsx}'
              - 'shared/**/*.ts'
              - 'tests/**/*.ts'
              - 'eslint.config.mjs'
              - '.prettierrc'
              - '.prettierignore'
              # The typecheck lane keys off this filter — a PR that loosens a
              # tsconfig (strict, paths, includes) must not be able to skip it.
              - 'tsconfig*.json'
              - 'backend/tsconfig.json'
              - 'frontend/tsconfig*.json'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
            backend:
              - 'backend/**'
              - 'shared/**'
              - 'tests/**'
              - 'tools/**'
              - 'tsconfig*.json'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'shared/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              # A dep-only bump is the case most likely to break E2E — without these
              # the package files skip the only lane that would catch it. Workspaces:
              # the single root lockfile carries every tier's resolutions.
              - 'package*.json'
              - 'backend/package.json'
              - 'frontend/package.json'

  # ── Lint — eslint flat config across backend/src, shared, tests, frontend/src.
  lint:
    needs: [changes]
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      # prettier is enforced, not aspirational — a formatting config that nothing
      # checks would drift into a lie (this repo's tier-1 rule applied to itself).
      - run: npm run format:check

  # ── Typecheck — the tests-inclusive type gate. Vitest (esbuild) strips types
  #    without checking, so a type error in any test/arch file passes every other
  #    lane; this closes that hole. One workspaces install covers every tier.
  typecheck:
    needs: [changes]
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  # ── Backend — typecheck/build + the node test tiers (unit + integration + arch).
  backend:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build -w backend
      # Boot the real built artifact under Node's NodeNext ESM resolver — the one
      # surface tsc/vitest never exercise. Zero-dep (node tools/smoke.mjs); the
      # dist the prior step built lives at backend/dist/…
      - run: npm run test:smoke:dist
      - run: npm test -w backend

  # ── Frontend — typecheck + vite build + the jsdom test tier.
  frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build -w frontend
      - run: npm test -w frontend

  # ── E2E — the expensive lane. Real browser + both servers. Only on code change.
  e2e:
    needs: [changes]
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test # always-on API specs
      - run: npm run test:ui # flag-gated UI specs (built frontend)

  # ────────────────────────────────────────────────────────────────
  # Lockfile drift — `npm install --package-lock-only` must be a no-op
  # on a fresh checkout. Catches a dep that silently rewrites the
  # lockfile on every contributor's first install.
  # ────────────────────────────────────────────────────────────────
  lockfile-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm install --package-lock-only --ignore-scripts
      - name: Assert lockfile unchanged
        run: git diff --exit-code package-lock.json

  # ────────────────────────────────────────────────────────────────
  # Secret scan — cheap leak insurance for a widely-cloned template;
  # reinforces the repo's "don't leak" ethos. fetch-depth: 0 so gitleaks
  # sees full history. Runs the pinned gitleaks CLI directly against FULL
  # history (--log-opts=--all) instead of gitleaks-action: the action
  # derives a `firstCommit^..lastCommit` range from the push/PR event,
  # which is unresolvable when the range includes the root commit (its
  # `^` parent doesn't exist) — that breaks on an initial push or after a
  # history rewrite, and every "Use this template" clone's first push. A
  # whole-history CLI scan is range-independent, needs no license/token,
  # and still exits non-zero on any real finding.
  # ────────────────────────────────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # sha256-pinned: a compromised release asset (or MITM'd download) must fail
      # the job, not run with repo access. Hash is from the release's official
      # checksums.txt. Refresh version + hash together — see docs/SETUP.md →
      # "Keeping the template fresh".
      - name: gitleaks (full-history scan)
        env:
          GITLEAKS_VERSION: 8.24.3
          GITLEAKS_SHA256: 9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
        run: |
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xz -C /tmp -f /tmp/gitleaks.tar.gz gitleaks
          /tmp/gitleaks detect --source . --log-opts=--all --redact -v --exit-code 1

  # ────────────────────────────────────────────────────────────────
  # Fan-in — THE single required status check. Path-filtered lanes
  # skip on irrelevant PRs, which breaks branch protection both ways:
  # mark the lanes themselves required and a docs-only PR can never
  # merge (its skipped checks never report); leave them optional and
  # a code PR whose lane failed can merge anyway. This job always
  # runs, fails if any lane failed or was cancelled, and treats
  # skipped as success. Protect the branch with exactly this one
  # check — "results" — and none of the individual lanes.
  # ────────────────────────────────────────────────────────────────
  results:
    if: always()
    needs: [changes, lint, typecheck, backend, frontend, e2e, lockfile-drift, secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Fail on any failed or cancelled lane
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          bad=$(echo "$RESULTS" | jq -r \
            'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')
          if [ -n "$bad" ]; then
            echo "::error::Failed or cancelled lanes: $(echo "$bad" | tr '\n' ' ')"
            exit 1
          fi
          echo "All lanes passed or were legitimately skipped."
