name: review-pr
description: |
  STARTING POINT — adapt before relying on the output.

  Use when: you want an invariant-aware review of a PR.
  Does: loads .archon/invariants.yaml -> classifies which invariants the PR's
        changed files trigger -> conditionally runs an invariant reviewer (only
        when something fired) alongside a general code reviewer -> aggregates to
        one verdict.

  Data-driven: adding a row to .archon/invariants.yaml auto-enrolls it here at
  runtime (cc-load-invariants cats the file) — no edit to this workflow needed.

  Contract:
    input    $ARGUMENTS = PR number or URL
    output   markdown verdict aggregating the reviewers
    side FX  none — read-only review; never writes to the PR

nodes:
  - id: check-deps
    bash: |
      command -v gh >/dev/null && command -v jq >/dev/null || {
        echo "missing deps: need gh and jq"
        exit 1
      }
    timeout: 10000

  - id: scope
    bash: |
      # Archon renders $ARGUMENTS before bash runs — extract digits so "42",
      # "#42", and a pull URL all resolve to the PR number.
      PR=$(printf '%s' "$ARGUMENTS" | grep -oE '[0-9]+' | head -1)
      if [ -z "$PR" ]; then
        PR=$(gh pr view --json number --jq .number 2>/dev/null)
      fi
      if [ -z "$PR" ]; then
        echo "no PR number — pass as workflow argument or run from a PR branch"
        exit 1
      fi
      gh pr view "$PR" --json number,title,body,headRefName,baseRefName,files,labels,state
    timeout: 60000
    depends_on: [check-deps]

  - id: load-invariants
    bash: 'cat .archon/invariants.yaml'
    depends_on: [check-deps]

  - id: classify-triggers
    prompt: |
      You are an invariant trigger classifier. Given the invariants (YAML) and
      the PR's changed files (JSON), determine which invariants fire.

      ## Invariants (.archon/invariants.yaml)
      $load-invariants.output

      ## PR scope (gh pr view JSON)
      $scope.output

      ## Task
      For each invariant, check whether ANY of its `trigger_paths` glob-matches
      ANY changed file in the PR. Globs use shell-style wildcards (**, *, ?,
      {a,b}). Decide trigger matching ONLY — do not judge rule compliance here.

      Output STRUCTURED JSON.
    depends_on: [scope, load-invariants]
    allowed_tools: []
    output_format:
      type: object
      properties:
        any_triggered:
          type: string
          enum: ["true", "false"]
        triggered:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              rule: { type: string }
              reason: { type: string }
              severity: { type: string, enum: ["critical", "important", "minor"] }
              matched_files: { type: array, items: { type: string } }
            required: [id, rule, reason, severity, matched_files]
      required: [any_triggered, triggered]

  - id: review-invariants
    # Runs ONLY when at least one invariant fired. Adapt this prompt to inspect
    # the diff against each triggered rule.
    prompt: |
      You are an invariant reviewer. The following invariants fired for this PR.
      Read the PR diff and report, for each, whether the rule is upheld or
      violated, with file:line evidence.

      ## Triggered invariants
      $classify-triggers.output

      ## PR scope
      $scope.output
    depends_on: [classify-triggers, scope]
    when: "$classify-triggers.output.any_triggered == 'true'"
    context: fresh

  - id: review-general
    # Always runs — general code-quality pass independent of invariants.
    # Adapt to your stack (replace with your own reviewer command/prompt).
    prompt: |
      Review this PR for correctness, clarity, and obvious bugs. Be concise;
      report only findings worth a maintainer's attention, with file:line refs.

      ## PR scope
      $scope.output
    depends_on: [scope]
    context: fresh

  - id: aggregate
    prompt: |
      Aggregate the reviews below into one markdown verdict. Surface which
      invariants fired vs were skipped, then list findings by severity.

      ## Triggered invariants
      $classify-triggers.output

      ## Invariant review (empty if none fired)
      $review-invariants.output

      ## General review
      $review-general.output
    depends_on: [classify-triggers, review-invariants, review-general]
    trigger_rule: all_done
